<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<title>Calibrar Zonas – Mapa</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#eee;font-family:Segoe UI,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#toolbar{padding:10px 16px;background:#1c2128;border-bottom:1px solid #30363d;display:flex;gap:10px;align-items:center;flex-shrink:0;flex-wrap:wrap}
#toolbar h1{font-size:1rem;font-weight:700;color:#58a6ff;margin-right:8px}
select{background:#0d1117;color:#eee;border:1px solid #30363d;padding:5px 9px;border-radius:6px;font-size:.9rem}
button{padding:6px 14px;border-radius:6px;border:1px solid #30363d;background:#21262d;color:#eee;cursor:pointer;font-size:.85rem}
button:hover{background:#30363d}
button.primary{background:#2188ff;border-color:#2188ff;color:#fff;font-weight:600}
button.primary:hover{background:#1565c0}
#output{background:#0d1117;color:#3fb950;border:1px solid #30363d;padding:8px 12px;font-family:monospace;font-size:.75rem;max-width:500px;border-radius:6px;white-space:pre;overflow:auto;max-height:80px;flex:1}
#hint{font-size:.78rem;color:#8b949e}
#viewport{flex:1;overflow:auto;position:relative;background:#000;display:flex;align-items:flex-start;justify-content:flex-start}
#wrap{position:relative;display:inline-block;flex-shrink:0}
#wrap img{display:block;user-select:none;-webkit-user-drag:none}
.zone{position:absolute;border:2px solid;cursor:move;display:flex;align-items:center;justify-content:center;box-sizing:border-box}
.zone-lbl{font-size:10px;font-weight:700;text-shadow:0 0 4px #000,0 0 4px #000;pointer-events:none;text-align:center;padding:2px;background:rgba(0,0,0,.4);border-radius:3px;white-space:nowrap;max-width:100%;overflow:hidden}
.handle{position:absolute;width:10px;height:10px;background:#fff;border:1px solid #000;border-radius:2px;z-index:10;cursor:nwse-resize}
.handle.br{bottom:-5px;right:-5px}
.zone.selected{outline:2px solid #fff;outline-offset:1px}
</style>
</head>
<body>
<div id="toolbar">
  <h1>🗺 Calibrar Zonas</h1>
  <label style="font-size:.85rem">Zona activa:
    <select id="zsel"></select>
  </label>
  <button id="btnFit">Ajustar pantalla</button>
  <button id="btnExport" class="primary">📋 Copiar MAP_ZONES</button>
  <div id="output">← pulsa "Copiar MAP_ZONES" para exportar</div>
  <span id="hint">Arrastra la zona · esquina inferior-derecha para redimensionar</span>
</div>
<div id="viewport">
  <div id="wrap">
    <img id="mapimg" src="assets/mapa.jpg" draggable="false"/>
    <div id="zones-layer"></div>
  </div>
</div>

<script>
// ── Zonas actuales – sincronizadas con app.js MAP_ZONES ───────────────
const ZONES = [
  { id:'direccion',         label:'Dirección',            r: 33,g:136,b:255, x:14, y:44, w:11, h: 9 },
  { id:'biblioteca',        label:'Biblioteca',           r: 46,g:160,b: 67, x:26, y:44, w:11, h: 9 },
  { id:'utp',               label:'U.T.P.',               r:227,g: 98,b:  9, x:14, y:54, w: 9, h: 8 },
  { id:'centro-innovacion', label:'Centro de Innovación', r:163,g:113,b:247, x:40, y:56, w:12, h: 9 },
  { id:'pabellon-a',        label:'Pabellón A',           r:227,g:179,b: 65, x:13, y:63, w: 8, h: 8 },
  { id:'pabellon-b',        label:'Pabellón B',           r:227,g:179,b: 65, x:22, y:63, w: 8, h: 8 },
  { id:'pabellon-c',        label:'Pabellón C',           r:227,g:179,b: 65, x:31, y:63, w: 8, h: 8 },
  { id:'pabellon-d',        label:'Pabellón D',           r:227,g:179,b: 65, x:13, y:72, w: 8, h: 8 },
  { id:'pabellon-e',        label:'Pabellón E',           r:227,g:179,b: 65, x:22, y:72, w: 8, h: 8 },
  { id:'pabellon-f',        label:'Pabellón F',           r:227,g:179,b: 65, x:31, y:72, w: 8, h: 8 },
  { id:'comedor',           label:'Comedor',              r:  0,g:188,b:212, x:24, y:79, w:18, h:10 },
  { id:'taller-mecanica',   label:'Taller Mecánica',      r:219,g:171,b:  9, x:68, y:40, w:28, h:43 },
];

const img    = document.getElementById('mapimg');
const layer  = document.getElementById('zones-layer');
const wrap   = document.getElementById('wrap');
const sel    = document.getElementById('zsel');
const output = document.getElementById('output');
const vp     = document.getElementById('viewport');

let scale = 1;
let selectedId = ZONES[0].id;

// Populate select
ZONES.forEach(z => {
  const o = document.createElement('option');
  o.value = z.id; o.textContent = z.label;
  sel.appendChild(o);
});
sel.addEventListener('change', () => { selectedId = sel.value; renderAll(); });

// Fit image to viewport height on load
function fitToScreen() {
  const vw = vp.clientWidth, vh = vp.clientHeight;
  const iw = img.naturalWidth, ih = img.naturalHeight;
  scale = Math.min(vw / iw, vh / ih);
  img.style.width  = (iw * scale) + 'px';
  img.style.height = (ih * scale) + 'px';
  layer.style.width  = img.style.width;
  layer.style.height = img.style.height;
  renderAll();
}

img.onload = fitToScreen;
if (img.complete && img.naturalWidth) fitToScreen();
document.getElementById('btnFit').onclick = fitToScreen;

// Render all zone divs
function renderAll() {
  layer.innerHTML = '';
  ZONES.forEach(z => createZoneEl(z));
}

function createZoneEl(z) {
  const iw = img.naturalWidth, ih = img.naturalHeight;
  const el = document.createElement('div');
  el.className = 'zone' + (z.id === selectedId ? ' selected' : '');
  el.dataset.id = z.id;
  el.style.cssText = `
    left:${(z.x / 100) * img.clientWidth}px;
    top:${(z.y / 100) * img.clientHeight}px;
    width:${(z.w / 100) * img.clientWidth}px;
    height:${(z.h / 100) * img.clientHeight}px;
    border-color:rgba(${z.r},${z.g},${z.b},1);
    background:rgba(${z.r},${z.g},${z.b},.25);
    color:rgb(${z.r},${z.g},${z.b});
  `;
  el.innerHTML = `<span class="zone-lbl">${z.label}</span>`;

  // Resize handle
  const handle = document.createElement('div');
  handle.className = 'handle br';
  el.appendChild(handle);

  // Drag to move
  let startX, startY, startZx, startZy;
  el.addEventListener('mousedown', e => {
    if (e.target === handle) return;
    e.preventDefault();
    selectedId = z.id; sel.value = z.id;
    renderAll(); // re-render to update selected state

    startX = e.clientX; startY = e.clientY;
    startZx = z.x; startZy = z.y;

    function onMove(e) {
      const dx = (e.clientX - startX) / img.clientWidth  * 100;
      const dy = (e.clientY - startY) / img.clientHeight * 100;
      z.x = Math.max(0, Math.min(99 - z.w, startZx + dx));
      z.y = Math.max(0, Math.min(99 - z.h, startZy + dy));
      updateEl(el, z);
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  // Drag handle to resize
  handle.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    const startX2 = e.clientX, startY2 = e.clientY;
    const startW = z.w, startH = z.h;
    function onMove(e) {
      const dw = (e.clientX - startX2) / img.clientWidth  * 100;
      const dh = (e.clientY - startY2) / img.clientHeight * 100;
      z.w = Math.max(1, startW + dw);
      z.h = Math.max(1, startH + dh);
      updateEl(el, z);
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  layer.appendChild(el);
}

function updateEl(el, z) {
  el.style.left   = (z.x / 100 * img.clientWidth)  + 'px';
  el.style.top    = (z.y / 100 * img.clientHeight) + 'px';
  el.style.width  = (z.w / 100 * img.clientWidth)  + 'px';
  el.style.height = (z.h / 100 * img.clientHeight) + 'px';
}

// Export
document.getElementById('btnExport').onclick = () => {
  const lines = ZONES.map(z => {
    const xr  = Math.round(z.x * 10) / 10;
    const yr  = Math.round(z.y * 10) / 10;
    const wr  = Math.round(z.w * 10) / 10;
    const hr  = Math.round(z.h * 10) / 10;
    return `  { id:'${z.id}',${' '.repeat(Math.max(0,20-z.id.length))}label:'${z.label}',${' '.repeat(Math.max(0,22-z.label.length))}r:${String(z.r).padStart(3)},g:${String(z.g).padStart(3)},b:${String(z.b).padStart(3)}, x:${String(xr).padStart(4)}, y:${String(yr).padStart(4)}, w:${String(wr).padStart(4)}, h:${String(hr).padStart(4)} },`;
  }).join('\n');
  const code = `const MAP_ZONES = [\n${lines}\n];`;
  navigator.clipboard.writeText(code).catch(()=>{});
  output.textContent = code;
};
</script>
</body>
</html>
